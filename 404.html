<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Page Not Found | Mateen Arshad</title>

    <meta name="description"
          content="The page you are looking for could not be found.">

    <link rel="icon" type="image/png" href="images/favicon.png">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="pageLoader" class="page-loader">
    <div class="loader-content">

       <div class="loader-logo">
    <img src="images/favicon.jpeg" alt="Mateen Arshad Logo">
</div>
        <div class="loader-line">
            <span></span>
        </div>

        <p>LOADING EXPERIENCE</p>

    </div>
</div>

    <main class="error-page">

        <div class="error-card">

            <span class="error-number">
                404
            </span>

            <span class="section-label">
                PAGE NOT FOUND
            </span>

            <h1>
                Looks Like You Took a
                <span class="text-gold">Wrong Turn.</span>
            </h1>

            <p>
                The page you are looking for doesn't exist or may have
                been moved to another location.
            </p>

            <div class="error-actions">

                <a href="index.html" class="btn btn-gold">
                    <i class="bi bi-house"></i>
                    Back to Home
                </a>

                <a href="projects.html" class="btn btn-outline-gold">
                    View Projects
                    <i class="bi bi-arrow-up-right"></i>
                </a>

            </div>

        </div>

    </main>

</body>

</html>
